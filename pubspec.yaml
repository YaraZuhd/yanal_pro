name: yanal_pro
description: "نظام إدارة التجارة والمحاسبة - العبهري ينال للتجارة والتوزيع"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  pdf: ^3.10.4
  printing: ^5.12.0
  dropdown_button2: ^2.3.9
  blue_thermal_printer:
    path: packages/blue_thermal_printer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Amiri-Regular.ttf

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/yanal_launcher.png"
